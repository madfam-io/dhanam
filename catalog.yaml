  karafiel:
    name: "Karafiel"
    description: "Combat Accounting — SAT compliance automation for Mexico"
    category: compliance
    website: "https://karafiel.mx"
    sort_order: 2
    tiers:
      contador:
        dhanam_tier: essentials
        display_name: "Contador"
        # Yearly set at the higher end of the PRICING_OVERHAUL_20260417.md
        # range ($10,188-$11,988). Principle: premium list price + well-
        # timed campaigns for accessibility (year-1 founding member 40%
        # off brings yearly effective to ~$7,192/yr, which is still above
        # misKuentas Básico $10K/yr minus the 23% annual discount once
        # the founding cohort rolls off to list pricing in year 2).
        # Prior value was 99900 cents ($999/yr total) which the
        # pricing-intelligence tool flagged as a 93% annual discount
        # catalog bug.
        prices:
          MXN: { monthly: 129900, yearly: 1198800 }
        metadata:
          rfc_limit: 10
        features:
          - "Descarga masiva CFDI automatica"
          - "Contabilidad electronica (Anexo 24)"
          - "DIOT automatico desde CFDIs"
          - "Declaraciones provisionales ISR/IVA"
          - "Blindaje 69-B en tiempo real"
          - "Alertas proactivas"
          - "10 RFCs incluidos"
          - "Prueba gratuita de 14 dias"
      despacho:
        dhanam_tier: pro
        display_name: "Despacho"
        # Yearly fix — same story as contador. Prior 299900 cents
        # ($2,999/yr total) was a 94% annual discount catalog bug;
        # 3598800 cents ($35,988/yr) is 25% off monthly-equivalent
        # and matches the Despacho-tier recommendation in
        # PRICING_OVERHAUL_20260417.md section 2.2.
        prices:
          MXN: { monthly: 399900, yearly: 3598800 }
        metadata:
          rfc_limit: 50
        features:
          - "Todo en Contador"
          - "Agente Portal SAT autonomo (Kafi)"
          - "Declaraciones anuales PF y PM"
          - "Evidencia forense GPS + NOM-151"
          - "Contratos con e.firma + fecha cierta"
          - "Auto-presentacion de declaraciones"
          - "Conciliacion bancaria automatica"
          - "50 RFCs incluidos"
          - "Soporte prioritario"
      firma:
        dhanam_tier: premium
        display_name: "Firma"
        # Custom pricing — no Stripe price created (sales-driven)
        prices: {}
        metadata:
          rfc_limit: 9999
        features:
          - "Todo en Despacho"
          - "Verificacion biometrica para firmas"
          - "Trabajo de campo con geofencing"
          - "Monitoreo legislativo (DOF + RMF)"
          - "Analisis de leyes con IA"
          - "Integracion con ERP"
          - "RFCs ilimitados"
          - "SLA de 4 horas"
          - "Onboarding personalizado"
