# ═══════════════════════════════════════════════════
# MADFAM Product Catalog — Single Source of Truth
# ═══════════════════════════════════════════════════
#
# This file defines ALL MADFAM ecosystem products, pricing tiers,
# features, and credit costs. It is synced to Stripe and the
# Dhanam product catalog DB via `scripts/sync-catalog.ts`.
#
# To add a new product:
#   1. Add it here (pricing, features, credit costs)
#   2. Run: npx tsx scripts/sync-catalog.ts
#   3. Products appear in Stripe + Dhanam DB automatically
#
# Prices are in smallest currency unit (centavos for MXN, cents for USD).
# The sync script creates Stripe Products + Prices and stores IDs in DB.
#
# ───────────────────────────────────────────────────────────
# ROADMAP — Purchasing-Power-Parity (PPP) / Regional pricing
# ───────────────────────────────────────────────────────────
# The current catalog only expresses USD + MXN. Per the 2026-04-17
# pricing overhaul directive, MADFAM will eventually optimise prices
# per region + currency + purchasing power (Netflix-style PPP). The
# planned schema extension adds a sibling `regional_factors` map:
#
#   products.<slug>.tiers.<tier>.prices.USD.monthly: <usd_cents>
#   products.<slug>.tiers.<tier>.regional_factors:
#     MX: 1.00    # full USD anchor, covered today by MXN prices
#     CO: 0.85    # 15% discount via PPP
#     AR: 0.60    # 40% discount — captures soft-currency markets
#     BR: 0.90    # anchor close to USD
#     US: 1.00
#     EU: 1.10    # EUR zone premium
#
# Until `sync-catalog.ts` learns to materialise these into per-country
# Stripe Prices, the factors should stay advisory. The
# `pricing-intelligence` skill can start recommending factors
# immediately.

