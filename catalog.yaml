  routecraft:
    name: "RouteCraft"
    description: "Event-driven routing and multi-city trip planning for distributed teams. Score conferences + optimize circuits automatically."
    category: travel
    website: "https://routecraft.app"
    sort_order: 7
    tiers:
      discovery:
        dhanam_tier: essentials
        display_name: "Discovery"
        # Higher-end entry price per user directive (2026-04-17).
        # TravelPerk starts at ~$99/user/mo for their self-serve tier;
        # Navan is free + enterprise quote. RouteCraft lands above the
        # free-tier floor but below TravelPerk's mid-market mark.
        # Founding member year-1 40% off brings this to $35.40 USD /
