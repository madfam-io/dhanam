          MXN: { monthly: 29900, yearly: 286800 }
        features:
          - "Everything in Essentials"
          - "Unlimited provider connections"
          - "Unlimited simulations"
          - "5 financial spaces"
          - "Estate planning (Life Beat)"
          - "Household views (Yours/Mine/Ours)"
          - "Collectibles valuation"
          - "DeFi portfolio tracking"
          - "5 GB storage"
      premium:
        dhanam_tier: premium
        display_name: "Premium"
        # Raised from $19.99 -> $29.99 per PRICING_OVERHAUL_20260417.md
        # section 2.1, higher-end. Monte Carlo + estate + DeFi depth is
        # qualitatively stronger than Monarch's top tier; $5 above Pro
        # was too shallow. New ratio pro->premium is 2.0x (was 1.65x,
