# ═══════════════════════════════════════════════════
# MADFAM Product Catalog — Single Source of Truth
# ═══════════════════════════════════════════════════
#
# This file defines ALL MADFAM ecosystem products, pricing tiers,
# features, and credit costs. It is synced to Stripe and the
# Dhanam product catalog DB via `scripts/sync-catalog.ts`.
#
# To add a new product:
#   1. Add it here (pricing, features, credit costs)
#   2. Run: npx tsx scripts/sync-catalog.ts
#   3. Products appear in Stripe + Dhanam DB automatically
#
# Prices are in smallest currency unit (centavos for MXN, cents for USD).
# The sync script creates Stripe Products + Prices and stores IDs in DB.

