# =============================================================================
# ArgoCD Application CRD for Dhanam
# =============================================================================
# Defines GitOps sync for the production Dhanam deployment.
# ArgoCD watches infra/k8s/production/ and auto-syncs on git changes.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dhanam
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dhanam
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/madfam-org/dhanam.git
    targetRevision: main
    path: infra/k8s/production

  destination:
    server: https://kubernetes.default.svc
    namespace: dhanam

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
