# =============================================================================
# Alertmanager Configuration for Dhanam
# =============================================================================
# Routes critical alerts with 1h repeat, warnings with 12h repeat.
# Replace placeholder webhook URLs with real Slack/PagerDuty endpoints.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-dhanam
  namespace: dhanam-monitoring
  labels:
    app: dhanam
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - match:
            severity: critical
          receiver: critical
          repeat_interval: 1h
          continue: false
        - match:
            severity: warning
          receiver: warning
          repeat_interval: 12h

    receivers:
      - name: default
        webhook_configs:
          - url: 'http://placeholder-webhook/default'
            send_resolved: true

      - name: critical
        # TODO: Replace with real Slack/PagerDuty webhook
        webhook_configs:
          - url: 'http://placeholder-webhook/critical'
            send_resolved: true
        # Uncomment and configure for PagerDuty:
        # pagerduty_configs:
        #   - service_key: '<PAGERDUTY_SERVICE_KEY>'
        #     severity: critical
        # Uncomment and configure for Slack:
        # slack_configs:
        #   - api_url: '<SLACK_WEBHOOK_URL>'
        #     channel: '#dhanam-alerts-critical'
        #     title: '{{ .CommonAnnotations.summary }}'
        #     text: '{{ .CommonAnnotations.description }}'

      - name: warning
        webhook_configs:
          - url: 'http://placeholder-webhook/warning'
            send_resolved: true
        # Uncomment and configure for Slack:
        # slack_configs:
        #   - api_url: '<SLACK_WEBHOOK_URL>'
        #     channel: '#dhanam-alerts'
        #     title: '{{ .CommonAnnotations.summary }}'
        #     text: '{{ .CommonAnnotations.description }}'

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
