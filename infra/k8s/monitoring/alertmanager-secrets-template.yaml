# =============================================================================
# Alertmanager Secrets Template
# =============================================================================
# Copy this file, fill in real values, and apply before alertmanager-config.yaml.
#
# The Slack webhook URLs and PagerDuty keys referenced in
# alertmanager-config.yaml must be replaced with actual values before
# deploying to production.
#
# Required secrets:
#   SLACK_CRITICAL_WEBHOOK_URL - Slack incoming webhook for #dhanam-alerts-critical
#   SLACK_WARNING_WEBHOOK_URL  - Slack incoming webhook for #dhanam-alerts
#   PAGERDUTY_SERVICE_KEY      - (Optional) PagerDuty Events API v2 integration key
#
# How to obtain:
#   Slack:
#     1. Go to https://api.slack.com/apps
#     2. Create New App (or select existing) -> Incoming Webhooks -> Enable
#     3. Add New Webhook to Workspace -> select channel -> Copy URL
#     4. Repeat for each channel (#dhanam-alerts-critical, #dhanam-alerts)
#     5. URL format: https://hooks.slack.com/services/T.../B.../xxx
#
#   PagerDuty:
#     1. Go to PagerDuty -> Services -> New Service
#     2. Integration type: Events API v2
#     3. Copy the Integration Key (32-character hex string)
#
# Usage:
#   1. Copy this file to alertmanager-secrets.yaml (gitignored)
#   2. Replace the REPLACE_WITH_* values below with actual URLs/keys
#   3. kubectl apply -f alertmanager-secrets.yaml
#   4. kubectl apply -f alertmanager-config.yaml
#
# Volume mount:
#   The Alertmanager Deployment/StatefulSet must mount this secret at
#   /etc/alertmanager/secrets/ so that the api_url_file references in
#   alertmanager-config.yaml resolve correctly. Example:
#
#     volumeMounts:
#       - name: webhook-secrets
#         mountPath: /etc/alertmanager/secrets
#         readOnly: true
#     volumes:
#       - name: webhook-secrets
#         secret:
#           secretName: alertmanager-webhook-secrets
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-webhook-secrets
  namespace: dhanam-monitoring
  labels:
    app: dhanam
type: Opaque
stringData:
  # ---------------------------------------------------------------------------
  # Slack webhook URL for the CRITICAL receiver (#dhanam-alerts-critical).
  # Triggers on: pod crashes, DB down, auth failure spikes, provider failures.
  # Replace the value below with your real webhook URL.
  # ---------------------------------------------------------------------------
  SLACK_CRITICAL_WEBHOOK_URL: "REPLACE_WITH_SLACK_CRITICAL_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # Slack webhook URL for the WARNING receiver (#dhanam-alerts).
  # Triggers on: high p95 latency, queue depth, memory pressure, cert expiry.
  # Replace the value below with your real webhook URL.
  # ---------------------------------------------------------------------------
  SLACK_WARNING_WEBHOOK_URL: "REPLACE_WITH_SLACK_WARNING_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # (Optional) PagerDuty Events API v2 integration key.
  # Uncomment and fill in if you enable the pagerduty_configs block in
  # alertmanager-config.yaml.
  # ---------------------------------------------------------------------------
  # PAGERDUTY_SERVICE_KEY: "REPLACE_WITH_PAGERDUTY_SERVICE_KEY"
