# =============================================================================
# Alertmanager Secrets Template
# =============================================================================
# Copy this file, fill in real values, and apply before alertmanager-config.yaml.
#
# The Slack webhook URLs and PagerDuty keys referenced in
# alertmanager-config.yaml must be replaced with actual values before
# deploying to production.
#
# Required secrets:
#   SLACK_CRITICAL_WEBHOOK_URL - Slack incoming webhook for #dhanam-alerts-critical
#   SLACK_WARNING_WEBHOOK_URL  - Slack incoming webhook for #dhanam-alerts
#   PAGERDUTY_SERVICE_KEY      - (Optional) PagerDuty Events API v2 integration key
#
# How to obtain:
#   Slack:
#     1. Go to https://api.slack.com/apps
#     2. Create New App (or select existing) -> Incoming Webhooks -> Enable
#     3. Add New Webhook to Workspace -> select channel -> Copy URL
#     4. Repeat for each channel (#dhanam-alerts-critical, #dhanam-alerts)
#     5. URL format: https://hooks.slack.com/services/T.../B.../xxx
#
#   PagerDuty:
#     1. Go to PagerDuty -> Services -> New Service
#     2. Integration type: Events API v2
#     3. Copy the Integration Key (32-character hex string)
#
# Usage:
#   1. Copy this file to alertmanager-secrets.yaml (gitignored)
#   2. Replace the REPLACE_WITH_* values in alertmanager-config.yaml
#   3. kubectl apply -f alertmanager-config.yaml
# =============================================================================
