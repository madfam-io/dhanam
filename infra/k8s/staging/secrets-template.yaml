# =============================================================================
# Dhanam Staging Secrets Template
# =============================================================================
# INSTRUCTIONS:
# 1. Copy this file to secrets.yaml (NOT tracked in git)
# 2. Fill in staging credentials (use test/sandbox keys)
# 3. Apply: kubectl apply -f secrets.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: dhanam-secrets
  namespace: dhanam-staging
  labels:
    app: dhanam
    environment: staging
type: Opaque
stringData:
  DATABASE_URL: "<postgresql://user:pass@host:5432/dhanam_staging>"
  REDIS_URL: "<redis://host:6379/1>"

  # Must be exactly 32 ASCII characters
  ENCRYPTION_KEY: "<exactly-32-ascii-characters-key>"

  OIDC_CLIENT_ID: "<janua-staging-client-id>"
  OIDC_CLIENT_SECRET: "<janua-staging-client-secret>"
  NEXTAUTH_SECRET: "<random-32-char-secret>"
  JWT_SECRET: "<random-jwt-secret-min-32-chars>"
  JWT_REFRESH_SECRET: "<random-jwt-refresh-secret-min-32-chars>"
