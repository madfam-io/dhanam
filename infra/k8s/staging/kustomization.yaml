apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dhanam-staging

resources:
  - namespace.yaml
  - api-deployment.yaml
  - web-deployment.yaml

# Staging overrides: 1 replica, :main image tags, NODE_ENV=staging
patches:
  # API: single replica, staging env
  - target:
      kind: Deployment
      name: dhanam-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "staging"
  # Web: single replica, staging env
  - target:
      kind: Deployment
      name: dhanam-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "staging"
  # HPA: disable autoscaling in staging
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

images:
  - name: dhanam-api
    newName: ghcr.io/madfam-org/dhanam/api
    newTag: main
  - name: dhanam-web
    newName: ghcr.io/madfam-org/dhanam/web
    newTag: main
