- digest: sha256:002a7180e7099ff4931bfa23330038ec535ce646c15e5d1d3d1f6f7400624297
  name: dhanam-api
  newName: ghcr.io/madfam-org/dhanam/api
- digest: sha256:a44e909efed49b5ebe95fdb637d726c922081fd15420f3d396ff1f28bd289b28
  name: dhanam-web
  newName: ghcr.io/madfam-org/dhanam/web
